companies:
- name: Bluecrest Wellness
  url: https://bluecrestwellness.com/
- name: RandoxHealth
  url: https://randoxhealth.com/en-GB/
- name: Qured
  url: https://www.qured.com/
feeds:
- name: BBC Health
  url: https://feeds.bbci.co.uk/news/health/rss.xml
- name: BBC Business
  url: https://feeds.bbci.co.uk/news/business/rss.xml
- name: BBC World
  url: https://feeds.bbci.co.uk/news/world/rss.xml
- name: BBC Science
  url: https://feeds.bbci.co.uk/news/science_and_environment/rss.xml
- name: BBC UK
  url: https://feeds.bbci.co.uk/news/uk/rss.xml
- name: Guardian Health
  url: https://www.theguardian.com/society/health/rss
- name: Guardian Business
  url: https://www.theguardian.com/uk/business/rss
- name: Guardian Rss
  url: https://www.theguardian.com/uk/rss
- name: Reuters Health
  url: https://news.google.com/rss/search?q=health+screening+UK&hl=en-GB&gl=GB
- name: Google Wellness
  url: https://news.google.com/rss/search?q=corporate+wellness+UK&hl=en-GB&gl=GB
pipeline:
  articles_per_feed: 50
  keywords:
  - blood test
  - bluecrest
  - corporate wellness
  - diagnostics
  - employee health
  - health and wellness
  - health screening
  - healthcare
  - healthy lifestyle
  - occupational health
  - preventive care
  - preventive health
  - screening services
  - telemedicine
  - wellness
  - wellness programs
  - workplace wellness
  alert_threshold:
    relevance: 7
    impact: 7
llm:
  provider: kiro  # Options: "ollama" or "kiro"
  base_url: http://localhost:11434  # Used for embeddings (Ollama) even with kiro provider
  model: null  # null = let kiro-cli use its default model
  embedding_model: nomic-embed-text:latest
  effort: low  # ACP effort level: low, medium, high (lower = faster/cheaper)
  prompt_rules: []  # Custom rules/considerations for the AI prompt

verification:
  enabled: true
  provider: openrouter
  model: google/gemini-2.0-flash-001
  sample_rate_interesting: 1.0  # Verify 100% of high relevance items
  sample_rate_random: 1.0       # Verify 100% of all other items (Total Verification)
  log_file: logs/verification.jsonl
storage:
  chroma_dir: chroma_db
  alerts_log: logs/alerts.log
  status_file: logs/status.json
  context_cache: logs/company_context.txt
  feedback_log: logs/tag_feedback.jsonl
scheduler:
  enabled: true
  interval_minutes: 60
web:
  host: 0.0.0.0
  port: 5000
